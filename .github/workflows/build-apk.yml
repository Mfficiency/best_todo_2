name: Build APK

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      id: upload_apk
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Add APK download link to summary
      if: always()
      shell: bash
      run: |
        if [ -n "${{ steps.upload_apk.outputs.artifact-url }}" ]; then
          echo "### APK Download" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Download app-release-apk artifact](${{ steps.upload_apk.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
        fi
